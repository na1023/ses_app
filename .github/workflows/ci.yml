name: CI

on:
  push:
  pull_request:

jobs:
  static-check:
    name: 構文・未定義名チェック
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: 構文チェック (compileall)
        run: python -m compileall -q app.py pages utils

      - name: 未定義名・構文エラー検出 (flake8)
        # F821: 未定義名 / F823: 代入前参照 / F811: 多重定義 / E999: 構文エラー
        # （未使用importなどのスタイル警告は対象外にして実バグだけを検出）
        run: python -m flake8 --select=E999,F821,F823,F811 app.py pages utils
